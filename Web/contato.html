<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Página de contato" />
  <meta name="keywords" content="contato, formulário, mensagem" />
  <title>Contato - João Vitor Azambuja</title>
  <link href="style.css" rel="stylesheet" />
  <script src="scripts.js" defer></script>
</head>
<body>
  <div id="header-container"></div>

  <main class="page-card form-page">
    <h1>Contato</h1>
    <p>Data <time datetime="2045-04-20">20/04/2045</time>.</p>

    <form action="#" method="POST">
      <div>
        <label for="name">Nome</label>
        <input type="text" id="name" name="name" placeholder="Digite seu nome" />
      </div>

      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email" />
      </div>

      <div>
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" placeholder="Manda email aí parceiro"></textarea>
      </div>

      <button type="submit">Enviar</button>
    </form>

  </main>

  <div id="footer-container"></div>

</body>
</html>
